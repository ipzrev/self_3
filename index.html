<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>self_3</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <button id="enable">Enable Gyroscope</button>

    <div class="scene">
      <img src="img/кот.png" class="layer" data-depth="5" />

      <img src="img/павер.png" class="layer" data-depth="15" />

      <img src="img/подписи.png" class="layer" data-depth="30" />
    </div>

    <script>
      const button = document.getElementById("enable");

      button.addEventListener("click", async () => {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const permission = await DeviceOrientationEvent.requestPermission();

          alert(permission);
        } else {
          alert("sensor works automatically");
        }
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
